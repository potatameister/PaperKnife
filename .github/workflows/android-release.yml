name: Build & Sign Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm ci

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: wrapper
          cache-disabled: true

      - name: Build F-Droid Lite APK (No OCR)
        run: |
          export VITE_DISABLE_OCR=true
          npm run build
          npx cap sync android
          
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease
          mv app/build/outputs/apk/release/app-release-unsigned.apk ../paperknife-lite-unsigned.apk

      - name: Sign APK
        id: sign_app
        uses: ilharp/sign-android-release@v2
        with:
          releaseDir: .
          signingKey: ${{ secrets.ANDROID_SIGNING_KEY }}
          keyAlias: ${{ secrets.ANDROID_ALIAS }}
          keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}
          buildToolsVersion: "34.0.0"

      - name: Rename & Prepare Artifacts
        run: |
          VERSION=$(node -p "require('./package.json').version")
          cp paperknife-lite-unsigned-signed.apk "paperknife-lite-v${VERSION}.apk"
          echo "APP_VERSION=${VERSION}" >> $GITHUB_ENV

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PaperKnife-lite-v${{ env.APP_VERSION }}
          path: paperknife-lite-v${{ env.APP_VERSION }}.apk
          if-no-files-found: error
